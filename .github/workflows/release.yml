name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Automated build for ${{ env.RELEASE_TAG }}.

            Assets are uploaded by the Windows portable, Windows installer, Ubuntu installer, Linux musl, and macOS installer jobs.

  windows-portable:
    name: Windows portable
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend UI checks
        working-directory: frontend
        run: npm run test:ui

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build portable exe
        working-directory: src-tauri
        run: cargo build --release

      - name: Show Windows build outputs
        shell: pwsh
        run: |
          Get-ChildItem -Path "src-tauri\target" -Recurse -File |
            Where-Object { $_.FullName -match "\\release\\" -and ($_.Extension -eq ".exe" -or $_.Name -eq "WebView2Loader.dll") } |
            Select-Object -ExpandProperty FullName

      - name: Package portable exe
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $releaseDir = Join-Path $PWD "dist-release"
          $portableDir = Join-Path $releaseDir "ai-term-$tag-windows-x64-portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          $exe = Get-ChildItem -Path "src-tauri\target" -Recurse -File -Filter "ai-term.exe" |
            Where-Object { $_.FullName -match "\\release\\ai-term\.exe$" } |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path "src-tauri\target" -Recurse -File -Filter "AI Term.exe" |
              Where-Object { $_.FullName -match "\\release\\AI Term\.exe$" } |
              Sort-Object FullName |
              Select-Object -First 1
          }
          if (-not $exe) {
            Write-Host "Executable files under src-tauri\target:"
            Get-ChildItem -Path "src-tauri\target" -Recurse -File -Filter "*.exe" |
              Select-Object -ExpandProperty FullName
            throw "Cannot find Windows release executable artifact."
          }
          Copy-Item -LiteralPath $exe.FullName -Destination (Join-Path $portableDir "AI Term.exe") -Force
          $webviewLoader = Get-ChildItem -Path "src-tauri\target" -Recurse -File -Filter "WebView2Loader.dll" |
            Where-Object { $_.FullName -match "\\release\\WebView2Loader\.dll$" } |
            Sort-Object FullName |
            Select-Object -First 1
          if ($webviewLoader) {
            Copy-Item -LiteralPath $webviewLoader.FullName -Destination $portableDir -Force
          } else {
            Write-Warning "WebView2Loader.dll was not found. The portable zip will include only ai-term.exe."
          }
          $zip = Join-Path $releaseDir "ai-term-$tag-windows-x64-portable.zip"
          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath $zip -Force

      - name: Upload Windows portable asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist-release/*.zip
          fail_on_unmatched_files: true

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend UI checks
        working-directory: frontend
        run: npm run test:ui

      - name: Build Windows installer
        working-directory: src-tauri
        run: ..\frontend\node_modules\.bin\tauri.cmd build --ci --bundles msi

      - name: Show Windows installer outputs
        shell: pwsh
        run: |
          Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File |
            Select-Object -ExpandProperty FullName

      - name: Upload Windows installer asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true

  ubuntu-installer:
    name: Ubuntu installer
    runs-on: ubuntu-22.04
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            wget

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend UI checks
        working-directory: frontend
        run: npm run test:ui

      - name: Build Ubuntu deb installer
        working-directory: src-tauri
        run: ../frontend/node_modules/.bin/tauri build --ci --bundles deb

      - name: Show Ubuntu installer outputs
        run: |
          find src-tauri/target/release/bundle -type f -print

      - name: Upload Ubuntu installer asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: true

  macos-installer:
    name: macOS installer
    runs-on: macos-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend UI checks
        working-directory: frontend
        run: npm run test:ui

      - name: Build macOS dmg installer
        working-directory: src-tauri
        run: ../frontend/node_modules/.bin/tauri build --ci --target universal-apple-darwin --bundles dmg

      - name: Show macOS installer outputs
        run: |
          find src-tauri/target/universal-apple-darwin/release/bundle -type f -print

      - name: Upload macOS installer asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true

  linux-musl:
    name: Linux musl
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build in Alpine musl container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            rust:1-alpine3.20 \
            sh -c '
              set -eu
              export PATH="/usr/local/cargo/bin:${PATH}"
              export RUSTFLAGS="-C target-feature=-crt-static"
              export PKG_CONFIG_ALLOW_CROSS=1
              rustc --version
              cargo --version
              rustup --version
              apk add --no-cache \
                bash \
                build-base \
                curl \
                file \
                gtk+3.0-dev \
                libayatana-appindicator-dev \
                librsvg-dev \
                nodejs \
                npm \
                openssl-dev \
                pax-utils \
                pkgconf \
                webkit2gtk-dev \
                wget
              rustup target add x86_64-unknown-linux-musl
              cd frontend
              npm install
              npm run test:ui
              npm run build
              cd ../src-tauri
              cargo build --release --target x86_64-unknown-linux-musl
              file target/x86_64-unknown-linux-musl/release/ai-term
              ldd target/x86_64-unknown-linux-musl/release/ai-term || true
              scanelf -n target/x86_64-unknown-linux-musl/release/ai-term || true
            '

      - name: Show Linux build outputs
        run: |
          find src-tauri/target -type f -perm -111 -path '*/release/*' -print

      - name: Package musl binary
        run: |
          tag="${RELEASE_TAG}"
          mkdir -p dist-release
          binary="$(find src-tauri/target -type f -perm -111 -path '*/release/ai-term' | sort | head -n 1)"
          if [ -z "$binary" ]; then
            echo "Executable files under src-tauri/target:"
            find src-tauri/target -type f -perm -111 -print || true
            echo "Cannot find ai-term linux release artifact."
            exit 1
          fi
          package_dir="$PWD/dist-release/linux-musl"
          mkdir -p "$package_dir"
          cp "$binary" "$package_dir/ai-term"
          cat > "$package_dir/README-linux-musl.txt" <<'EOF'
          This is a musl build intended for Alpine Linux or other musl-based systems.
          It is dynamically linked against GTK/WebKitGTK runtime libraries; fully static Tauri/WebKitGTK builds are not practical.
          On Alpine, install the matching runtime packages such as gtk+3.0, webkit2gtk, librsvg, and libayatana-appindicator.
          EOF
          tar -czf "dist-release/ai-term-${tag}-linux-x64-musl.tar.gz" \
            -C "$package_dir" \
            .

      - name: Upload Linux musl asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist-release/*.tar.gz
          fail_on_unmatched_files: true